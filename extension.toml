id = "zedge"
name = "Zedge"
description = "Edge inference coding IDE — AI that runs where you are"
version = "0.1.0"
schema_version = 1
authors = ["Edgework DAO"]
repository = "https://github.com/affectively-ai/zedge"

[slash_commands.zedge-status]
description = "Show inference chain health, compute pool stats, and token balance"
requires_argument = false

[slash_commands.zedge-models]
description = "List available models with latency tier and readiness"
requires_argument = false

[slash_commands.zedge-pool]
description = "Toggle compute pool participation and show earnings dashboard"
requires_argument = false

[slash_commands.zedge-feedback]
description = "Submit RLHF feedback on response quality"
requires_argument = false

[context_servers.zedge-companion]

