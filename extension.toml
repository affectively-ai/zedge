id = "zedge"
name = "Zedge"
description = "Edge inference coding IDE — AI that runs where you are"
version = "0.1.0"
schema_version = 1
authors = ["Edgework DAO"]
repository = "https://github.com/affectively-ai/zedge"

[slash_commands.zedge-status]
description = "Show inference chain health, compute pool stats, and token balance"
requires_argument = false

[slash_commands.zedge-models]
description = "List available models with latency tier and readiness"
requires_argument = false

[slash_commands.zedge-pool]
description = "Toggle compute pool participation and show earnings dashboard"
requires_argument = false

[slash_commands.zedge-logs]
description = "Show recent inference logs from the companion"
requires_argument = false

[slash_commands.zedge-clear]
description = "Clear inference logs"
requires_argument = false

[slash_commands.zedge-restart]
description = "Restart the companion sidecar"
requires_argument = false

[slash_commands.zedgework]
description = "Run edgework commands — emotions, sentiment, entities, embeddings, usage, and more"
requires_argument = true

[slash_commands.zedge-admin]
description = "Run aeon-cli admin commands (ops, fleet, ai, mcp, etc.)"
requires_argument = true

[slash_commands.zedge-mesh]
description = "Start, stop, or check P2P inference mesh status"
requires_argument = true

[slash_commands.zedge-crdt]
description = "Ghostwriter CRDT collaboration status and file management"
requires_argument = true

[slash_commands.zedge-forge]
description = "Forge deployment status and project list"
requires_argument = true

[slash_commands.zedge-kernel]
description = "Kernel daemon status, plugins, and flight log"
requires_argument = true

[slash_commands.zedge-scaffold]
description = "Create a new project from template (site, app, worker, mcp, agent, extension)"
requires_argument = true

[slash_commands.zedge-feedback]
description = "Submit RLHF feedback on response quality"
requires_argument = false

[context_servers.zedge-companion]

